<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guide01 SDK Demo</title>
    <style>
      :root { color-scheme: light dark; --indigo: #3f51b5; }
      * { box-sizing: border-box; }
      body { font-family: system-ui, sans-serif; margin: 0; }
      #appbar {
        background: var(--indigo); color: #fff; padding: 0.75rem 1rem;
        display: flex; align-items: center; gap: 0.75rem; position: sticky; top: 0;
        font-size: 1.1rem; font-weight: 600; min-height: 1.5rem;
      }
      #back { background: none; border: none; color: #fff; font-size: 1.3rem;
              cursor: pointer; padding: 0; line-height: 1; display: none; }
      #app { max-width: 720px; margin: 0 auto; padding: 0.5rem 0 4rem; }
      .tile {
        display: flex; align-items: center; justify-content: space-between;
        padding: 0.9rem 1.1rem; border-bottom: 1px solid #8883; cursor: pointer;
        font-size: 1rem;
      }
      .tile:hover { background: #8881; }
      .tile .chev { color: #888; }
      .card { border: 1px solid #8884; border-radius: 10px; margin: 0.9rem 1rem;
              padding: 0.8rem 1rem; }
      .card h3 { margin: 0 0 0.5rem; font-size: 0.95rem; }
      .row { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin: 0.4rem 0; }
      label { font-size: 0.85rem; display: inline-flex; gap: 0.3rem; align-items: center; }
      input[type="text"], input[type="number"] { width: 7rem; padding: 0.25rem; }
      button.action {
        background: var(--indigo); color: #fff; border: none; border-radius: 6px;
        padding: 0.4rem 0.85rem; cursor: pointer; font-size: 0.9rem;
      }
      button.outline {
        background: none; border: 1px solid var(--indigo); color: var(--indigo);
        border-radius: 6px; padding: 0.4rem 0.85rem; cursor: pointer; font-size: 0.9rem;
      }
      button.action:disabled, button.outline:disabled { opacity: 0.5; cursor: default; }
      .field { display: flex; flex-direction: column; gap: 0.2rem; margin: 0.45rem 0; }
      .field > span { font-size: 0.8rem; color: #888; }
      .field > input { width: 100%; }
      .grow { flex: 1; }
      progress { width: 100%; height: 0.5rem; }
      .tabbar { display: flex; gap: 0.25rem; border-bottom: 1px solid #8884; margin: 0 1rem; }
      .tab { padding: 0.5rem 1rem; cursor: pointer; font-size: 0.9rem; }
      .tab.active { border-bottom: 2px solid var(--indigo); font-weight: 600; }
      .muted { color: #888; font-size: 0.85rem; }
      .mono { font-family: ui-monospace, monospace; font-size: 0.8rem; white-space: pre-wrap; }
      .listrow { padding: 0.4rem 0; border-bottom: 1px solid #8882; font-size: 0.85rem; }
      #snackbar {
        position: fixed; left: 50%; bottom: 1rem; transform: translateX(-50%);
        background: #323232; color: #fff; padding: 0.6rem 1rem; border-radius: 6px;
        font-size: 0.85rem; max-width: 90%; opacity: 0; transition: opacity 0.2s;
        pointer-events: none;
      }
      #snackbar.show { opacity: 0.96; }
    </style>
  </head>
  <body>
    <div id="appbar"><button id="back" title="Back">←</button><span id="title">Guide01</span></div>
    <div id="app"></div>
    <div id="snackbar"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
